name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_call:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run Lint
              run: npm run lint

            - name: Run unit tests with coverage
              shell: bash
              run: |
                  npm run test-coverage | tee coverage-output.txt
                  {
                      echo '## Test Coverage'
                      echo '```text'
                      cat coverage-output.txt
                      echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"
