name: Tag Version

on:
    workflow_call:
        inputs:
            version_bump:
                required: true
                type: string
                description: "Which version fragment to bump."
            no_increment:
                type: boolean
                description: "Rerun current version. No version increment."
                default: false
    workflow_dispatch:
        inputs:
            version_bump:
                required: true
                type: choice
                description: "Which version fragment to bump."
                default: "patch"
                options:
                    - patch
                    - minor
                    - major
            no_increment:
                type: boolean
                description: "Rerun current version. No version increment."
                default: false
            dry_run:
                type: boolean
                description: "Do not modify, just validate."
                default: false

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    tag_version:
        name: Tag Version
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            # ----------------------------------------------------
            # Runs release-it
            # * (Required) Configures version_bump (workflow input)
            # * (Optional) Inlcudes no-increment option (workflow input)
            # * (Optional) Includes dry-run option (workflow input)
            # NOTE:
            # > Updates .env.release
            # > Updates package.json
            # > Creates Tag for target branch
            # ----------------------------------------------------
            - name: Update Version
              run: |
                  CMD="npm run release -- --ci --increment=${{github.event.inputs.version_bump}}"
                  if [ "${{ github.event.inputs.no_increment }}" = "true" ]; then
                      CMD="$CMD --no-increment"
                  fi
                  if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
                      CMD="$CMD --dry-run"
                  fi
                  echo "Running: $CMD"
                  $CMD
