<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Assist Bot - Authorization</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 600px;
            margin: 80px auto;
            padding: 0 24px;
            color: #e9e9e9;
            background: #0e0e10;
        }
        h1 { color: #9147ff; margin-bottom: 8px; }
        p { color: #adadb8; line-height: 1.6; }
        #auth-link {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 24px;
            background: #9147ff;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
        }
        #auth-link:hover { background: #772ce8; }
        #auth-link.loading { background: #3a3a3d; cursor: default; pointer-events: none; }
    </style>
</head>
<body>
    <h1>Stream Assist Bot</h1>
    <p>Authorization is required before the bot can connect to your channel.</p>
    <p>Clicking the button below will redirect you to Twitch to grant the necessary permissions.</p>
    <a id="auth-link" class="loading" href="#">Loading...</a>
    <script>
        fetch('/auth-url')
            .then(r => r.json())
            .then(data => {
                const link = document.getElementById('auth-link');
                link.href = data.url;
                link.textContent = 'Authorize with Twitch';
                link.classList.remove('loading');
            })
            .catch(() => {
                const link = document.getElementById('auth-link');
                link.textContent = 'Failed to load authorization URL - please refresh';
            });
    </script>
</body>
</html>
